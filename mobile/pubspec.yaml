name: movio_mobile
description: "MovIO — Smart Campus Transport student app for FUTA."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.12.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Map display — OpenStreetMap tiles (no API key needed)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # NFC card reading for student boarding
  flutter_nfc_kit: ^3.4.0

  # GPS location for live map positioning
  geolocator: ^13.0.2

  # HTTP REST calls to the MovIO backend
  http: ^1.2.2

  # State management
  provider: ^6.1.2

  # Socket.io WebSocket client for live bus location updates
  socket_io_client: ^3.0.2

  # Encrypted, Keystore-backed storage for the auth JWT (not plaintext prefs).
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

  # Generators (run once when branding changes), not shipped in the app:
  #   flutter pub run flutter_native_splash:create
  #   flutter pub run flutter_launcher_icons
  flutter_native_splash: ^2.4.1
  flutter_launcher_icons: ^0.14.1

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/images/

  # IBM Plex — the MovIO product typeface family. Sans for UI, Mono for real
  # machine data (wallet credits, matric no, trip IDs, NFC UIDs, ETAs), the same
  # rationale the admin dashboard uses. Self-hosted/bundled (the .ttf files live
  # in assets/fonts/, from IBM/plex v6.4.0) rather than fetched at runtime, so a
  # campus-wifi hiccup on defence day can't flash unstyled text.
  fonts:
    - family: IBM Plex Sans
      fonts:
        - asset: assets/fonts/IBMPlexSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBMPlexSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/IBMPlexSans-Bold.ttf
          weight: 700
    - family: IBM Plex Mono
      fonts:
        - asset: assets/fonts/IBMPlexMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBMPlexMono-Medium.ttf
          weight: 500

# ---------------------------------------------------------------------------
# Native splash screen (shown by Android itself while the Flutter engine boots,
# before any Dart runs). Regenerate after changing this block:
#   flutter pub run flutter_native_splash:create
# The animated in-app splash (features/splash) plays *after* this, once Dart is
# alive — the two together give a seamless brand-green launch with no white flash.
flutter_native_splash:
  color: "#0f7a52" # brand-700 — deep transport green
  image: assets/images/movio-icon.png
  android_12:
    color: "#0f7a52"
    image: assets/images/movio-icon.png
  android: true
  ios: false
  web: false

# ---------------------------------------------------------------------------
# Launcher icon generation from the green "M" mark. Regenerate with:
#   flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/images/movio-icon.png
  adaptive_icon_background: "#0f7a52"
  adaptive_icon_foreground: assets/images/movio-icon.png
  min_sdk_android: 26
